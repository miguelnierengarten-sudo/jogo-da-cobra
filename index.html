<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>

<style>
body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#111;
    color:white;
}

h1{
    color:#4CAF50;
}

select, button{
    padding:10px;
    margin:10px;
    font-size:16px;
    border-radius:8px;
}

canvas{
    background:black;
    border:3px solid #4CAF50;
}
</style>
</head>
<body>

<h1>🐍 Snake Game</h1>

<p>Pontos: <span id="score">0</span></p>

<label>Dificuldade:</label>

<select id="difficulty">
    <option value="200">Fácil</option>
    <option value="120" selected>Médio</option>
    <option value="70">Difícil</option>
</select>

<button id="startBtn">▶ Iniciar Jogo</button>

<br><br>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreText = document.getElementById("score");
const startBtn = document.getElementById("startBtn");
const difficulty = document.getElementById("difficulty");

const box = 20;

let snake;
let direction;
let food;
let score;
let game;

document.addEventListener("keydown", (event) => {

    if(event.key === "ArrowUp" && direction !== "DOWN")
        direction = "UP";

    if(event.key === "ArrowDown" && direction !== "UP")
        direction = "DOWN";

    if(event.key === "ArrowLeft" && direction !== "RIGHT")
        direction = "LEFT";

    if(event.key === "ArrowRight" && direction !== "LEFT")
        direction = "RIGHT";
});

function collision(head, body){

    for(let i = 0; i < body.length; i++){

        if(head.x === body[i].x &&
           head.y === body[i].y){
            return true;
        }
    }

    return false;
}

function draw(){

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,400,400);

    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    snake.forEach((part,index)=>{

        ctx.fillStyle =
        index === 0 ? "#4CAF50" : "#7CFC00";

        ctx.fillRect(part.x, part.y, box, box);
    });

    let x = snake[0].x;
    let y = snake[0].y;

    if(direction === "UP") y -= box;
    if(direction === "DOWN") y += box;
    if(direction === "LEFT") x -= box;
    if(direction === "RIGHT") x += box;

    if(x === food.x && y === food.y){

        score++;
        scoreText.textContent = score;

        food = {
            x: Math.floor(Math.random()*20)*box,
            y: Math.floor(Math.random()*20)*box
        };

    } else {
        snake.pop();
    }

    const head = {x,y};

    if(
        x < 0 ||
        y < 0 ||
        x >= 400 ||
        y >= 400 ||
        collision(head,snake)
    ){
        clearInterval(game);
        alert("Game Over! Pontuação: " + score);
        return;
    }

    snake.unshift(head);
}

function startGame(){

    clearInterval(game);

    snake = [{x:200,y:200}];
    direction = "RIGHT";

    score = 0;
    scoreText.textContent = score;

    food = {
        x: Math.floor(Math.random()*20)*box,
        y: Math.floor(Math.random()*20)*box
    };

    const speed = Number(difficulty.value);

    game = setInterval(draw, speed);
}

startBtn.addEventListener("click", startGame);
</script>

</body>
</html>
